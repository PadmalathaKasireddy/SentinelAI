# Render.com blueprint — FastAPI backend
services:
  - type: web
    name: sentinelai-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt && python -m scripts.train_all
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: API_HOST
        value: 0.0.0.0
